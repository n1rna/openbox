name: Deploy docs site

# Builds the Astro + Starlight site in `website/` (which loads markdown from
# `docs/`) and deploys it to Cloudflare Pages, served at https://docs.opbx.net.
# install.sh is copied into the site so it's also served at
# https://docs.opbx.net/install.sh.
#
# Required repo secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.
# One-time: create the Pages project `openbox-docs` and bind docs.opbx.net to it
# (see docs/deploy.md). The Worker at opbx.net is deployed separately
# (deploy-control.yaml).

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "docs/**"
      - "install.sh"
      - ".github/workflows/deploy-docs.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Stage install.sh into the site
        run: cp install.sh website/public/install.sh

      - name: Install dependencies
        run: bun install
        working-directory: website

      - name: Build with Astro
        run: bun run build
        working-directory: website

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website/dist --project-name=openbox-docs --branch=main
